<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-Waste Management</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container">
    <div class="card" style="max-width:700px;margin:auto;">
        <h2>Registration</h2>
        <p>Choose <strong>USER</strong> or apply as <strong>LOCAL_ADMIN</strong> (approval required).</p>
        <div id="msg"></div>
        <form id="registerForm" class="grid-2">
            <label>Name<input type="text" name="name" required maxlength="100"></label>
            <label>Email<input type="email" name="email" required></label>
            <label>Password<input type="password" name="password" required minlength="8"></label>
            <label>Phone<input type="text" name="phone" required></label>
            <label style="grid-column:1/-1;">Address<textarea name="address" required maxlength="255"></textarea></label>
            <label>Role
                <select name="role" id="role" required>
                    <option value="USER">USER</option>
                    <option value="LOCAL_ADMIN">LOCAL_ADMIN (Apply)</option>
                </select>
            </label>
            <label id="locationWrap" style="display:none;">Location (required for local admin)
                <input type="text" name="location" id="location" maxlength="80">
            </label>
            <div style="grid-column:1/-1;"><button type="submit">Submit</button></div>
        </form>
        <p><a href="/index.html">Back to login</a></p>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
